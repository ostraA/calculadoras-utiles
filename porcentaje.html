<!DOCTYPE html>
<html>
<head>
<title>Calculadora de Porcentaje</title>
<meta charset="UTF-8">
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center">

<h1>Calculadora de porcentaje</h1>

<input id="numero" placeholder="Número"><br><br>
<input id="porcentaje" placeholder="Porcentaje"><br><br>

<button onclick="calcular()">Calcular</button>

<h2 id="resultado"></h2>

<script>
function calcular(){
let numero=document.getElementById("numero").value;
let porcentaje=document.getElementById("porcentaje").value;

let resultado=(numero*porcentaje)/100;

document.getElementById("resultado").innerText="Resultado: "+resultado;
}
</script>

<br><br>
<a href="index.html">Volver</a>

</body>
</html>
