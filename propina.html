<!DOCTYPE html>
<html>
<head><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1369555603056153"
     crossorigin="anonymous"></script>
<title>Calculadora de propina</title>
<meta charset="UTF-8">
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center">

<h1>Calculadora de propina</h1>

<input id="cuenta" placeholder="Total de la cuenta"><br><br>
<input id="propina" placeholder="Propina %"><br><br>

<button onclick="calcular()">Calcular</button>

<h2 id="resultado"></h2>

<script>
function calcular(){

let cuenta=document.getElementById("cuenta").value;
let propina=document.getElementById("propina").value;

let total=cuenta*(1+propina/100);

document.getElementById("resultado").innerText="Total con propina: "+total;

}
</script>

<br><br>

</body>
</html>
