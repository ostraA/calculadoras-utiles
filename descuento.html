<!DOCTYPE html>
<html>
<head>
<title>Calculadora de descuento</title>
<meta charset="UTF-8">
</head>

<body style="background:black;color:white;font-family:Arial;text-align:center">

<h1>Calculadora de descuento</h1>

<input id="precio" placeholder="Precio original"><br><br>
<input id="descuento" placeholder="Descuento %"><br><br>

<button onclick="calcular()">Calcular</button>

<h2 id="resultado"></h2>

<script>
function calcular(){

let precio=document.getElementById("precio").value;
let descuento=document.getElementById("descuento").value;

let final=precio-(precio*descuento/100);

document.getElementById("resultado").innerText="Precio final: "+final;

}
</script>

<br><br>
<a href="index.html">Volver</a>

</body>
</html>
